<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070f" />
    <title>WIP — LosDenso.xyz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/nav.js" defer></script>
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="grain"     aria-hidden="true"></div>
    <div class="grid-bg"   aria-hidden="true"></div>

    <main class="page-wrapper">
      <header class="header">
        <div class="header-line" aria-hidden="true">
          <span>/LOSDENSO.XYZ/???</span>
          <span class="blink">▮</span>
        </div>
        <h1 class="site-title" style="font-size: clamp(1.8rem, 7vw, 5rem);">
          <span class="title-los">STILL BEING</span><br>
          <span class="title-denso">VIBE CODED</span><span class="title-dot">...</span>
        </h1>
        <div class="subtitle" id="status-line">[ LOADING VIBES — PLEASE STAND BY ]</div>
      </header>

      <footer class="footer" aria-hidden="true">
        <span class="footer-line">▸ STATUS: <span class="status-ok" id="vibe-status">VIBING</span></span>
        <span class="footer-line">▸ PROGRESS: <span id="progress">??%</span></span>
        <span class="footer-line">▸ ETA: <span style="color:var(--neon2)">UNKNOWN</span></span>
      </footer>
    </main>

    <script>
      const statuses  = ['VIBING', 'COOKING', 'IN FLOW', 'BUILDING', 'TWEAKING', 'SHIPPING SOON™'];
      const subtitles = [
        '[ LOADING VIBES — PLEASE STAND BY ]',
        '[ COOKING SOMETHING UP... ]',
        '[ COMPILING GOOD VIBES... ]',
        '[ ALMOST THERE. MAYBE. ]',
        '[ TRUST THE PROCESS ]',
      ];
      const progValues = ['??%', '..%', 'NaN%', '404%', '69%', '99%'];

      let si = 0, pi = 0, subi = 0;

      setInterval(() => {
        si = (si + 1) % statuses.length;
        document.getElementById('vibe-status').textContent = statuses[si];
      }, 2800);

      setInterval(() => {
        pi = (pi + 1) % progValues.length;
        document.getElementById('progress').textContent = progValues[pi];
      }, 1900);

      setInterval(() => {
        subi = (subi + 1) % subtitles.length;
        document.getElementById('status-line').textContent = subtitles[subi];
      }, 3500);
    </script>
  </body>
</html>
