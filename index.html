<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LosDenso.xyz — Personal site for projects, about me, and shop." />
    <meta property="og:title" content="LosDenso.xyz" />
    <meta property="og:description" content="Personal site for projects, about me, and shop." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>LosDenso.xyz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>

    <main class="page-wrapper">

      <header class="header">
        <div class="header-line" aria-hidden="true">
          <span>/LOSDENSO.XYZ</span>
          <span class="blink">▮</span>
        </div>
        <h1 class="site-title">
          <span class="title-los">HEY </span><span class="title-denso">THERE</span><span class="title-dot"> user.</span>
        </h1>
        <div class="subtitle" aria-hidden="true">[ TERMINAL — SELECT MODULE ]</div>
      </header>

      <nav class="cards-grid" aria-label="Site navigation">

        <a href="about/" class="nav-card" data-index="01" aria-label="About me">
          <div class="card-inner">
            <div class="card-index" aria-hidden="true">01</div>
            <span class="card-icon" aria-hidden="true">🚶</span>
            <div class="card-text">
              <span class="card-label">ABOUT ME</span>
              <span class="card-desc">identity.exe</span>
            </div>
          </div>
          <div class="card-bar" aria-hidden="true"></div>
        </a>

        <a href="projects/" class="nav-card featured" data-index="02" aria-label="Projects">
          <div class="card-inner">
            <div class="card-index" aria-hidden="true">02</div>
            <span class="card-icon" aria-hidden="true">⚙️</span>
            <div class="card-text">
              <span class="card-label">PROJECTS</span>
              <span class="card-desc">builds.log</span>
            </div>
          </div>
          <div class="card-bar" aria-hidden="true"></div>
        </a>

        <a href="shop/" class="nav-card" data-index="03" aria-label="Shop">
          <div class="card-inner">
            <div class="card-index" aria-hidden="true">03</div>
            <span class="card-icon" aria-hidden="true">🛒</span>
            <div class="card-text">
              <span class="card-label">SHOP</span>
              <span class="card-desc">store.dat</span>
            </div>
          </div>
          <div class="card-bar" aria-hidden="true"></div>
        </a>

      </nav>

      <footer class="footer" aria-hidden="true">
        <span class="footer-line">▸ UPTIME: <span id="uptime">00:00:00</span></span>
        <span class="footer-line">▸ STATUS: <span class="status-ok">ONLINE</span></span>
        <span class="footer-line">▸ v2.0.26</span>
      </footer>

    </main>

    <script>
      const start = Date.now();
      const uptimeEl = document.getElementById('uptime');
      setInterval(() => {
        const s = Math.floor((Date.now() - start) / 1000);
        const pad = n => String(n).padStart(2, '0');
        uptimeEl.textContent = `${pad(s / 3600 | 0)}:${pad(s % 3600 / 60 | 0)}:${pad(s % 60)}`;
      }, 1000);

      document.querySelectorAll('.nav-card').forEach(card => {
        card.addEventListener('mouseenter', () => {
          card.classList.add('glitching');
          setTimeout(() => card.classList.remove('glitching'), 400);
        });
      });

      const losEl = document.querySelector('.title-los');
      const densoEl = document.querySelector('.title-denso');
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%';
      const rand = () => chars[Math.random() * chars.length | 0];
      const scramble = str => str.split('').map(c => c === ' ' ? ' ' : rand()).join('');

      function glitchTitle() {
        let count = 0;
        const iv = setInterval(() => {
          if (count++ < 6) {
            losEl.textContent = scramble('HEY ');
            densoEl.textContent = scramble('THERE');
          } else {
            losEl.textContent = 'HEY ';
            densoEl.textContent = 'THERE';
            clearInterval(iv);
          }
        }, 60);
      }
      setTimeout(glitchTitle, 800);
      setInterval(glitchTitle, 7000);
    </script>
  </body>
</html>
