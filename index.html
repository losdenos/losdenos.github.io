<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Denso</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="scene">
  <div id="typed-display"><span id="typed-text"></span><span id="cursor"></span></div>
  <div id="keyboard-wrap">
    <div class="kb-row">
      <div class="key" data-char="`">~</div>
      <div class="key" data-char="1">1</div>
      <div class="key" data-char="2">2</div>
      <div class="key" data-char="3">3</div>
      <div class="key" data-char="4">4</div>
      <div class="key" data-char="5">5</div>
      <div class="key" data-char="6">6</div>
      <div class="key" data-char="7">7</div>
      <div class="key" data-char="8">8</div>
      <div class="key" data-char="9">9</div>
      <div class="key" data-char="0">0</div>
    </div>
    <div class="kb-row">
      <div class="key" data-char="q">Q</div>
      <div class="key" data-char="w">W</div>
      <div class="key" data-char="e">E</div>
      <div class="key" data-char="r">R</div>
      <div class="key" data-char="t">T</div>
      <div class="key" data-char="y">Y</div>
      <div class="key" data-char="u">U</div>
      <div class="key" data-char="i">I</div>
      <div class="key" data-char="o">O</div>
      <div class="key" data-char="p">P</div>
    </div>
    <div class="kb-row">
      <div class="key mid-key" data-char="">CAP</div>
      <div class="key" data-char="a">A</div>
      <div class="key" data-char="s">S</div>
      <div class="key" data-char="d">D</div>
      <div class="key" data-char="f">F</div>
      <div class="key" data-char="g">G</div>
      <div class="key" data-char="h">H</div>
      <div class="key" data-char="j">J</div>
      <div class="key" data-char="k">K</div>
      <div class="key" data-char="l">L</div>
    </div>
    <div class="kb-row">
      <div class="key wide-key" data-char="shift">SHF</div>
      <div class="key" data-char="z">Z</div>
      <div class="key" data-char="x">X</div>
      <div class="key" data-char="c">C</div>
      <div class="key" data-char="v">V</div>
      <div class="key" data-char="b">B</div>
      <div class="key" data-char="n">N</div>
      <div class="key" data-char="m">M</div>
      <div class="key wide-key" data-char="shift2">SHF</div>
      <div class="key enter-key" data-char="enter" id="enter-key">↵ SKIP</div>
    </div>
    <div class="kb-row">
      <div class="key space-key" data-char=" ">SPACE</div>
    </div>
  </div>
  <div id="train-switch-wrap">
    <canvas id="train-switch-canvas" width="60" height="60"></canvas>
    <div id="train-switch-label">DARK MODE</div>
  </div>
  <div id="nav-wrap">
    <div class="nav-btn" id="btn-about">About Me</div>
    <div class="nav-btn" id="btn-projects">Projects</div>
    <div class="nav-btn" id="btn-contact">Contact</div>
  </div>
</div>
<canvas id="train-canvas"></canvas>

<div id="foot-footer">
  <canvas id="foot-canvas" width="100" height="80"></canvas>
  <div id="foot-links">
    <a href="https://github.com/losdenos" target="_blank">GitHub</a>
    <a href="#" target="_blank">Twitter</a>
    <div id="email-link">Email</div>
  </div>
</div>
<canvas id="truck-canvas"></canvas>
<!-- train-canvas reserved for future use -->
<!-- <canvas id="train-canvas"></canvas> -->
<div id="loader"><div id="loader-text">Loading...</div></div>
<canvas id="crack-canvas"></canvas>

<div id="mode-selector">
  <div id="mode-selector-content">
    <div id="mode-selector-title">Welcome to Densley's Site</div>
    <div id="mode-selector-subtitle">Click one of the buttons below.</div>
    <div id="mode-selector-buttons">
      <div class="mode-btn-wrap" data-tooltip="Employers click here!">
        <a href="/corporate" class="mode-btn" id="mode-corporate">I'm in a hurry</a>
      </div>
      <div class="mode-btn-wrap" data-tooltip="My fun site!">
        <div class="mode-btn" id="mode-creative">I got time</div>
      </div>
    </div>
  </div>
</div>

<!-- SVG filter for gravitational warp effect -->
<svg id="warp-svg" style="position:fixed;width:0;height:0;pointer-events:none;z-index:-1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blackhole-warp" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feTurbulence id="warp-turbulence" type="turbulence" baseFrequency="0.00 0.00" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap id="warp-displace" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<!-- Black hole canvas overlay -->
<canvas id="blackhole-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:90;pointer-events:none;display:none;"></canvas>
<script src="script.js"></script>
</body>
</html>
