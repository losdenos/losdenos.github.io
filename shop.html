<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Shop — LosDenso.co</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .page-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        width: 100%;
        max-width: 900px;
        animation: fadeIn 0.6s ease 0.2s both;
      }
      .placeholder-box {
        width: 100%;
        border: 1px solid var(--border);
        padding: 3rem 2rem;
        text-align: center;
        clip-path: polygon(0 12px,12px 0,calc(100% - 12px) 0,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0 calc(100% - 12px));
        background: var(--surface);
        position: relative;
      }
      .placeholder-box .card-corner { position: absolute; width: 16px; height: 16px; }
      .placeholder-box .card-corner.tl { top:4px;left:4px;border-top:1.5px solid var(--neon2);border-left:1.5px solid var(--neon2); }
      .placeholder-box .card-corner.tr { top:4px;right:4px;border-top:1.5px solid var(--neon2);border-right:1.5px solid var(--neon2); }
      .placeholder-box .card-corner.bl { bottom:4px;left:4px;border-bottom:1.5px solid var(--neon2);border-left:1.5px solid var(--neon2); }
      .placeholder-box .card-corner.br { bottom:4px;right:4px;border-bottom:1.5px solid var(--neon2);border-right:1.5px solid var(--neon2); }
      .placeholder-label {
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text-dim);
        letter-spacing: 0.2em;
        margin-bottom: 1rem;
      }
      .placeholder-title {
        font-family: var(--display);
        font-size: clamp(2rem, 6vw, 4rem);
        color: var(--neon2);
        text-shadow: 0 0 20px var(--neon2);
        letter-spacing: 0.06em;
      }
      .placeholder-hint {
        font-family: var(--mono);
        font-size: 0.65rem;
        color: var(--text-dim);
        margin-top: 1rem;
        letter-spacing: 0.15em;
      }
      .back-btn {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--neon);
        text-decoration: none;
        letter-spacing: 0.15em;
        border: 1px solid var(--border);
        padding: 0.6rem 1.25rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        clip-path: polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
      }
      .back-btn:hover {
        border-color: var(--neon);
        box-shadow: 0 0 16px rgba(0,255,231,0.2);
      }
    </style>
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>

    <main class="page-wrapper">
      <header class="header" style="animation: fadeIn 0.6s ease both;">
        <div class="header-line" aria-hidden="true">
          <span>SYS://LOSDENSO.CO/SHOP</span>
          <span class="blink">▮</span>
        </div>
        <h1 class="site-title" style="font-size: clamp(2rem, 8vw, 6rem);">
          <span class="title-los">THE</span><span class="title-dot"> SHOP</span>
        </h1>
        <div class="subtitle">[ store.dat — MODULE LOADED ]</div>
      </header>

      <div class="page-content">
        <div class="placeholder-box">
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
          <div class="placeholder-label">// YOUR CONTENT GOES HERE</div>
          <div class="placeholder-title">🛒 SHOP</div>
          <div class="placeholder-hint">[ AWAITING INPUT — EDIT shop.html TO FILL THIS PAGE ]</div>
        </div>
        <a href="index.html" class="back-btn">◂ RETURN TO TERMINAL</a>
      </div>

      <footer class="footer" aria-hidden="true">
        <span class="footer-line">▸ MODULE: <span style="color:var(--neon2)">SHOP</span></span>
        <span class="footer-line">▸ STATUS: <span class="status-ok">ONLINE</span></span>
        <span class="footer-line">▸ v2.0.26</span>
      </footer>
    </main>
  </body>
</html>
