<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070f" />
    <title>Shop — LosDenso.xyz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/nav.js" defer></script>
    <style>
      /* ── shop-specific overrides ── */
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      /* accent colours per card */
      .card-valo  { --card-accent: #ff4655; --card-glow-c: rgba(255,70,85,0.18); }
      .card-mc    { --card-accent: #5dbb6a; --card-glow-c: rgba(93,187,106,0.18); }
      .card-beats { --card-accent: #c8ff00; --card-glow-c: rgba(200,255,0,0.18);  }

      .nav-card.card-valo:hover,
      .nav-card.card-valo:focus-visible {
        border-color: var(--card-accent);
        box-shadow: 0 0 20px rgba(255,70,85,0.25), 0 0 60px rgba(255,70,85,0.08), inset 0 0 30px rgba(255,70,85,0.05);
      }
      .nav-card.card-mc:hover,
      .nav-card.card-mc:focus-visible {
        border-color: var(--card-accent);
        box-shadow: 0 0 20px rgba(93,187,106,0.25), 0 0 60px rgba(93,187,106,0.08), inset 0 0 30px rgba(93,187,106,0.05);
      }
      .nav-card.card-beats:hover,
      .nav-card.card-beats:focus-visible {
        border-color: var(--card-accent);
        box-shadow: 0 0 20px rgba(200,255,0,0.25), 0 0 60px rgba(200,255,0,0.08), inset 0 0 30px rgba(200,255,0,0.05);
      }
      .back-btn {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--neon);
        text-decoration: none;
        letter-spacing: 0.15em;
        border: 1px solid var(--border);
        padding: 0.6rem 1.25rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        clip-path: polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
      }

      /* per-card corners */
      .card-valo  .card-corner { border-color: var(--card-accent) !important; }
      .card-mc    .card-corner { border-color: var(--card-accent) !important; }
      .card-beats .card-corner { border-color: var(--card-accent) !important; }

      /* per-card scan + bar */
      .card-valo  .card-scan,  .card-valo  .card-bar  { background: linear-gradient(90deg, transparent, #ff4655, transparent); }
      .card-mc    .card-scan,  .card-mc    .card-bar   { background: linear-gradient(90deg, transparent, #5dbb6a, transparent); }
      .card-beats .card-scan,  .card-beats .card-bar   { background: linear-gradient(90deg, transparent, #c8ff00, transparent); }

      /* per-card glow orb */
      .card-valo  .card-glow  { background: radial-gradient(circle, rgba(255,70,85,0.2), transparent 70%); }
      .card-mc    .card-glow  { background: radial-gradient(circle, rgba(93,187,106,0.2), transparent 70%); }
      .card-beats .card-glow  { background: radial-gradient(circle, rgba(200,255,0,0.2), transparent 70%); }

      /* label colour on hover */
      .card-valo:hover  .card-label { color: #ff4655; text-shadow: 0 0 20px #ff4655; }
      .card-mc:hover    .card-label { color: #5dbb6a; text-shadow: 0 0 20px #5dbb6a; }
      .card-beats:hover .card-label { color: #c8ff00; text-shadow: 0 0 20px #c8ff00; }

      /* icon glow colour on hover */
      .card-valo:hover  .card-icon  { filter: drop-shadow(0 0 20px rgba(255,70,85,0.8)); }
      .card-mc:hover    .card-icon  { filter: drop-shadow(0 0 20px rgba(93,187,106,0.8)); }
      .card-beats:hover .card-icon  { filter: drop-shadow(0 0 20px rgba(200,255,0,0.8)); }

      /* status tag below desc */
      .card-tag {
        margin-top: 0.6rem;
        font-family: var(--mono);
        font-size: 0.58rem;
        letter-spacing: 0.14em;
        padding: 0.22rem 0.65rem;
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.45);
        clip-path: polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px));
        transition: border-color 0.2s, color 0.2s;
      }
      .card-valo:hover  .card-tag { border-color: rgba(255,70,85,0.4);  color: #ff4655; }
      .card-mc:hover    .card-tag { border-color: rgba(93,187,106,0.4); color: #5dbb6a; }
      .card-beats:hover .card-tag { border-color: rgba(200,255,0,0.4);  color: #c8ff00; }

      /* icon drop-shadow default */
      .card-valo  .card-icon { filter: drop-shadow(0 0 12px rgba(255,70,85,0.35)); }
      .card-mc    .card-icon { filter: drop-shadow(0 0 12px rgba(93,187,106,0.35)); }
      .card-beats .card-icon { filter: drop-shadow(0 0 12px rgba(200,255,0,0.35)); }

      /* tablet: override last-child centering */
      @media (min-width: 501px) and (max-width: 780px) {
        .cards-grid { grid-template-columns: repeat(2, 1fr); }
        .nav-card:last-child { grid-column: 1 / -1; max-width: 48%; margin: 0 auto; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="grain"     aria-hidden="true"></div>
    <div class="grid-bg"   aria-hidden="true"></div>

    <main class="page-wrapper" style="justify-content: flex-start; padding-top: clamp(2rem,5vh,3.5rem);">

      <header class="header" style="animation: fadeIn 0.6s ease both;">
        <div class="header-line" aria-hidden="true">
          <span>/LOSDENSO.XYZ/SHOP</span>
          <span class="blink">▮</span>
        </div>
        <h1 class="site-title" style="font-size: clamp(2rem, 8vw, 5.5rem);">
          <span class="title-los">THE</span><span class="title-dot"> SHOP</span>
        </h1>
        <div class="subtitle">[ store.dat — 3 LISTINGS ACTIVE ]</div>
      </header>

      <div class="cards-grid">

        <!-- ── VALORANT ── -->
        <a href="valorant/" rel="noopener noreferrer"
           class="nav-card card-valo"
           onmouseenter="this.classList.add('glitching')"
           onanimationend="this.classList.remove('glitching')">
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
          <div class="card-scan"  aria-hidden="true"></div>
          <span class="card-index">01</span>

          <div class="card-inner">
            <div class="card-icon-wrap">
              <div class="card-glow" aria-hidden="true"></div>
              <div class="card-icon" aria-hidden="true">🎯</div>
            </div>
            <div class="card-text">
              <div class="card-label">VALORANT</div>
              <div class="card-desc">ACCOUNTS · APAC</div>
              <div class="card-tag">VIEW LISTINGS ↗</div>
            </div>
          </div>

          <div class="card-bar" aria-hidden="true"></div>
        </a>

        <!-- ── MINECRAFT ── -->
        <a href="/maintenance/" rel="noopener noreferrer"
           class="nav-card card-mc"
           onmouseenter="this.classList.add('glitching')"
           onanimationend="this.classList.remove('glitching')">
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
          <div class="card-scan"  aria-hidden="true"></div>
          <span class="card-index">02</span>

          <div class="card-inner">
            <div class="card-icon-wrap">
              <div class="card-glow" aria-hidden="true"></div>
              <div class="card-icon" aria-hidden="true">⛏️</div>
            </div>
            <div class="card-text">
              <div class="card-label">MINECRAFT</div>
              <div class="card-desc">BUILDS · JAVA</div>
              <div class="card-tag">BROWSE BUILDS ↗</div>
            </div>
          </div>

          <div class="card-bar" aria-hidden="true"></div>
        </a>

        <!-- ── MUSIC BEATS ── -->
        <a href="/maintenance/" rel="noopener noreferrer"
           class="nav-card card-beats"
           onmouseenter="this.classList.add('glitching')"
           onanimationend="this.classList.remove('glitching')">
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
          <div class="card-scan"  aria-hidden="true"></div>
          <span class="card-index">03</span>

          <div class="card-inner">
            <div class="card-icon-wrap">
              <div class="card-glow" aria-hidden="true"></div>
              <div class="card-icon" aria-hidden="true">🎧</div>
            </div>
            <div class="card-text">
              <div class="card-label">MUSIC BEATS</div>
              <div class="card-desc">ORIGINAL TRACKS</div>
              <div class="card-tag">BROWSE BEATS ↗</div>
            </div>

          </div>
          <div class="card-bar" aria-hidden="true"></div>
        </a>
      </div>
      <footer class="footer" aria-hidden="true">
        <span>▸ MODULE: <span style="color:var(--neon2)">SHOP</span></span>
        <span>▸ LISTINGS: <span class="status-ok">3 ACTIVE</span></span>
        <span>▸ v3.0.0</span>
      </footer>

    </main>
  </body>
</html>
